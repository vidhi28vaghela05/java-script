<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body  class="bg-gradient-to-br from-yellow-100 via-purple-100 to-pink-100 min-h-screen">
   
      <form action="" class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-8 mb-12 w-full mx-auto mt-20 max-w-lg border border-blue-100">
        <h2 class="text-center text-3xl font-semibold mb-6 text-blur-600">Add User</h2>
        <div class="mb-5">
          <label class="block text-gray-700 font-medium mb-2" for="name">Name</label>
          <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-400 transition" type="text" name="name" id="" placeholder="name" />
        </div>
        <div class="mb-5">
          <label class="block text-gray-700 font-medium mb-2" for="name">Role</label>
          <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-400 transition" type="text" name="role" id="" placeholder="role" />
        </div>
        <div class="mb-5">
          <label class="block text-gray-700 font-medium mb-2" for="name">Bio</label>
          <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-400 transition" type="text" name="bio" id="" placeholder="bio" />
        </div>
        <div class="mb-5">
          <label class="block text-gray-700 font-medium mb-2" for="name">Photo URL</label>
          <input class="outline-none w-full px-4 py-2 border-blue-200 border rounded-xl focus:ring-2 focus:ring-blue-400 transition" type="text" name="img" id="" placeholder="img" />
        </div>
        <button>Create Card</button>
      </form>

    <script src="script.js"></script>
  </body>
</html>
