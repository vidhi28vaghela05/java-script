<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlairWear | Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-white text-gray-900">
  <header data-sticky-nav class="sticky top-0 z-50 border-b border-gray-200 bg-white/95 backdrop-blur transition-shadow duration-300">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="index.html" class="text-2xl font-bold tracking-tight">FlairWear</a>
      <nav class="hidden items-center gap-8 text-sm font-medium md:flex"><a href="index.html" class="text-gray-600">Home</a><a href="shop.html" class="text-gray-600">Shop</a><a href="about.html" class="text-gray-600">About</a><a href="contact.html" class="text-black">Contact</a></nav>
      <a href="cart.html" class="relative text-gray-600 hover:text-black"><i class="fa-solid fa-cart-shopping"></i><span data-cart-count class="absolute -right-2 -top-2 hidden h-4 min-w-4 rounded-full bg-black px-1 text-[10px] leading-4 text-white"></span></a>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
    <h1 class="text-3xl font-semibold">Contact Us</h1>
    <div class="mt-8 grid gap-8 lg:grid-cols-2">
      <section class="rounded-2xl border border-gray-200 bg-gray-50 p-6">
        <h2 class="text-xl font-semibold">Get in touch</h2>
        <form class="mt-4 space-y-4">
          <input type="text" placeholder="Name" class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm outline-none focus:border-black" />
          <input type="email" placeholder="Email" class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm outline-none focus:border-black" />
          <textarea rows="6" placeholder="Message" class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm outline-none focus:border-black"></textarea>
          <button type="button" class="rounded-xl bg-black px-6 py-3 text-sm font-semibold text-white transition hover:bg-gray-800">Send Message</button>
        </form>
      </section>
      <section class="space-y-4">
        <div class="rounded-2xl border border-gray-200 p-6">
          <h3 class="font-semibold">Contact Details</h3>
          <p class="mt-3 text-sm text-gray-600">Email: support@flairwear.com</p>
          <p class="mt-1 text-sm text-gray-600">Phone: +1 234 567 890</p>
          <p class="mt-1 text-sm text-gray-600">Address: 221B Fashion Street, New York</p>
        </div>
        <iframe class="h-72 w-full rounded-2xl border border-gray-200" src="https://maps.google.com/maps?q=New%20York&t=&z=13&ie=UTF8&iwloc=&output=embed" loading="lazy"></iframe>
      </section>
    </div>
  </main>

  <footer class="border-t border-gray-200 bg-white"><p class="py-5 text-center text-sm text-gray-500">&copy; 2026 FlairWear. All rights reserved.</p></footer>
  <script src="script.js"></script>
</body>
</html>
