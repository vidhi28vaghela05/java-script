<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaf & Clay | Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-stone-50 text-stone-900">
  <header data-sticky-nav class="sticky top-0 z-50 border-b border-emerald-100 bg-stone-50/95 backdrop-blur transition-shadow duration-300">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="index.html" class="text-2xl font-bold tracking-tight text-emerald-900">Leaf & Clay</a>
      <nav class="hidden items-center gap-8 text-sm font-medium md:flex">
        <a href="index.html" class="text-stone-600 hover:text-emerald-800 transition-colors">Home</a>
        <a href="shop.html" class="text-stone-600 hover:text-emerald-800 transition-colors">Shop</a>
        <a href="about.html" class="text-stone-600 hover:text-emerald-800 transition-colors">About</a>
        <a href="contact.html" class="text-emerald-900">Contact</a>
      </nav>
      <div class="hidden items-center gap-4 md:flex">
        <button data-search-toggle class="text-stone-600 hover:text-emerald-800"><i class="fa-solid fa-magnifying-glass"></i></button>
        <a href="cart.html" class="relative text-stone-600 hover:text-emerald-800"><i class="fa-solid fa-cart-shopping"></i><span data-cart-count class="absolute -right-2 -top-2 hidden h-4 min-w-4 rounded-full bg-emerald-800 px-1 text-[10px] leading-4 text-white"></span></a>
        <button data-user-toggle class="text-stone-600 hover:text-emerald-800"><i class="fa-regular fa-user"></i></button>
      </div>
      <button data-menu-toggle class="md:hidden text-stone-700"><i class="fa-solid fa-bars text-xl"></i></button>
    </div>
    <div id="mobile-menu" class="hidden border-t border-emerald-100 bg-stone-50 md:hidden">
      <nav class="mx-auto grid max-w-7xl gap-3 px-4 py-4 text-sm sm:px-6">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="font-medium">Contact</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
    <h1 class="text-3xl font-semibold text-emerald-950">Contact Us</h1>
    <div class="mt-8 grid gap-8 lg:grid-cols-2">
      <section class="rounded-2xl border border-emerald-100 bg-white p-6">
        <h2 class="text-xl font-semibold">Get in touch</h2>
        <form class="mt-4 space-y-4">
          <input type="text" placeholder="Name" class="w-full rounded-xl border border-emerald-200 bg-white px-4 py-3 text-sm outline-none focus:border-emerald-700" />
          <input type="email" placeholder="Email" class="w-full rounded-xl border border-emerald-200 bg-white px-4 py-3 text-sm outline-none focus:border-emerald-700" />
          <textarea rows="6" placeholder="Message" class="w-full rounded-xl border border-emerald-200 bg-white px-4 py-3 text-sm outline-none focus:border-emerald-700"></textarea>
          <button type="button" class="rounded-xl bg-emerald-800 px-6 py-3 text-sm font-semibold text-white transition hover:bg-emerald-900">Send Message</button>
        </form>
      </section>
      <section class="space-y-4">
        <div class="rounded-2xl border border-emerald-100 bg-white p-6">
          <h3 class="font-semibold">Contact Details</h3>
          <p class="mt-3 text-sm text-stone-600">Email: hello@leafandclay.com</p>
          <p class="mt-1 text-sm text-stone-600">Phone: +1 234 567 890</p>
          <p class="mt-1 text-sm text-stone-600">Address: 18 Greenhouse Lane, Brooklyn, New York</p>
        </div>
        <iframe class="h-72 w-full rounded-2xl border border-emerald-100" src="https://maps.google.com/maps?q=Brooklyn%20New%20York&t=&z=13&ie=UTF8&iwloc=&output=embed" loading="lazy"></iframe>
      </section>
    </div>
  </main>

  <footer class="border-t border-emerald-100 bg-white"><p class="py-5 text-center text-sm text-stone-500">&copy; 2026 Leaf & Clay. All rights reserved.</p></footer>
  <script src="script.js"></script>
</body>
</html>
