<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>User Directory - Flip Cards</title>
    <style>
        /* 1. This gives the 3D depth effect */
        .perspective {
            perspective: 1000px;
        }
        /* 2. This allows the children to exist in 3D space */
        .preserve-3d {
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 3. The magic: Rotate the inner container on hover */
        .group:hover .preserve-3d {
            transform: rotateY(180deg);
        }
        /* 4. Hide the back of the card when facing away */
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        /* 5. Pre-rotate the back side so it faces 'away' initially */
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-slate-50 p-10 font-sans">

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 main">
        
       
        </div>
<script src="script.js"></script>
</body>
</html>
